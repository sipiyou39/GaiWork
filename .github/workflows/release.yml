name: Doudou Code Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version to publish (for example 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: doudou-code-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release metadata
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw_version="$DISPATCH_VERSION"
          else
            raw_version="$GITHUB_REF_NAME"
          fi

          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable releases require a plain semantic version such as 0.1.0; received '$raw_version'." >&2
            exit 1
          fi

          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "The release commit must belong to origin/main." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "release_name=Doudou Code v$version" >> "$GITHUB_OUTPUT"
          echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify package versions
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const expected = process.env.RELEASE_VERSION;
          const manifests = [
            "apps/server/package.json",
            "apps/desktop/package.json",
            "apps/web/package.json",
            "packages/contracts/package.json",
          ];
          const mismatches = manifests.flatMap((path) => {
            const version = JSON.parse(readFileSync(path, "utf8")).version;
            return version === expected ? [] : [`${path}: ${version}`];
          });

          if (mismatches.length > 0) {
            console.error(`Release packages must all use ${expected}:\n  ${mismatches.join("\n  ")}`);
            console.error(
              `Run 'node scripts/update-release-package-versions.ts ${expected}', commit the result, and retry.`,
            );
            process.exit(1);
          }
          NODE

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp test

  build_macos:
    name: Build macOS ${{ matrix.arch }}
    needs: preflight
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Fetch trusted main ref
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Build signed and notarized artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          T3CODE_DESKTOP_UPDATE_REPOSITORY: sipiyou39/GaiWork
        run: |
          set -euo pipefail

          required=(
            CSC_LINK
            CSC_KEY_PASSWORD
            APPLE_API_KEY
            APPLE_API_KEY_ID
            APPLE_API_ISSUER
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          chmod 600 "$key_path"
          export APPLE_API_KEY="$key_path"

          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch "${{ matrix.arch }}" \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --trusted-main-ref origin/main \
            --signed \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          shopt -s nullglob

          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.blockmap" \
            "release/*-mac.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            for manifest in release-publish/*-mac.yml; do
              mv "$manifest" "${manifest%.yml}-x64.yml"
            done
          fi

          if ! compgen -G "release-publish/*.dmg" >/dev/null || \
             ! compgen -G "release-publish/*.zip" >/dev/null || \
             ! compgen -G "release-publish/*-mac*.yml" >/dev/null; then
            echo "The macOS build did not produce every required updater asset." >&2
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doudou-code-macos-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs:
      - preflight
      - build_macos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: doudou-code-macos-*
          merge-multiple: true
          path: release-assets

      - name: Merge updater manifests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          merged=false
          for x64_manifest in release-assets/*-mac-x64.yml; do
            arm64_manifest="${x64_manifest%-x64.yml}.yml"
            if [[ ! -f "$arm64_manifest" ]]; then
              echo "Missing Apple Silicon manifest matching $x64_manifest." >&2
              exit 1
            fi
            node scripts/merge-update-manifests.ts --platform mac \
              "$arm64_manifest" \
              "$x64_manifest"
            rm "$x64_manifest"
            merged=true
          done

          if [[ "$merged" != true || ! -f release-assets/latest-mac.yml ]]; then
            echo "The canonical latest-mac.yml updater manifest was not produced." >&2
            exit 1
          fi

          [[ $(find release-assets -maxdepth 1 -name '*.dmg' | wc -l) -eq 2 ]]
          [[ $(find release-assets -maxdepth 1 -name '*.zip' | wc -l) -eq 2 ]]

      - name: Publish Doudou Code
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.blockmap
            release-assets/latest-mac.yml
